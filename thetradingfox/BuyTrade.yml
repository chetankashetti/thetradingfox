info:
  name: BuyTrade
  type: http
  seq: 4

http:
  method: post
  url: http://localhost:3000/trades
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "id": "1",
        "symbol": "BTC",
        "side": "buy",
        "price": 40000,
        "quantity": 1,
        "timestamp": "2021-01-01T00:00:00.000Z"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
